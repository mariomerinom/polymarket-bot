name: Predict and Score

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

concurrency:
  group: predict-and-score
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run-cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run prediction cycle
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        working-directory: src
        run: python ci_run.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/ prompts/
          git diff --cached --quiet || git commit -m "Auto: cycle update $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git pull --rebase
          git push
